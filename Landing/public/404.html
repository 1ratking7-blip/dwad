<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>Страница не найдена | ZHELEZO Crypto Gaming</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root { color-scheme: dark; }
    body {
      background: #0B0E14;
      color: #d1d5db;
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.7;
      max-width: 760px;
      margin: 0 auto;
      padding: 96px 24px;
      text-align: center;
    }
    h1 { color: #fff; font-size: 3rem; margin-bottom: 0.5rem; }
    p { font-size: 1.125rem; }
    a { color: #00E676; text-decoration: none; font-weight: 600; }
    .code { color: #00E676; font-weight: 800; font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1 id="h1">Страница не найдена</h1>
  <p id="msg">Такой страницы на ZHELEZO нет — возможно, ссылка устарела или содержит опечатку.</p>
  <p><a id="home" href="/">&larr; Вернуться на главную</a></p>
  <script>
    // Cloudflare Pages serves this one static file for every unmatched path across all
    // 3 language sections (/, /en/, /vi/) — there's no per-directory 404 in static
    // hosting, so detect the language from the URL prefix client-side instead.
    (function () {
      var COPY = {
        en: { title: 'Page Not Found | ZHELEZO Crypto Gaming', h1: 'Page Not Found',
          msg: "This page doesn't exist on ZHELEZO — the link may be outdated or mistyped.",
          home: '← Back to homepage', href: '/en/', lang: 'en' },
        vi: { title: 'Không Tìm Thấy Trang | ZHELEZO Crypto Gaming', h1: 'Không Tìm Thấy Trang',
          msg: 'Trang này không tồn tại trên ZHELEZO — liên kết có thể đã cũ hoặc bị sai.',
          home: '← Về trang chủ', href: '/vi/', lang: 'vi' },
      };
      var seg = location.pathname.split('/')[1];
      var c = COPY[seg];
      if (!c) return; // RU (no prefix) or unrecognized prefix — the RU markup above is already correct
      document.documentElement.lang = c.lang;
      document.title = c.title;
      document.getElementById('h1').textContent = c.h1;
      document.getElementById('msg').textContent = c.msg;
      var home = document.getElementById('home');
      home.href = c.href;
      home.textContent = c.home;
    })();
  </script>
</body>
</html>
