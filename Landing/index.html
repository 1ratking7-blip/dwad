    <!--
      Автоопределение языка при первом визите: если ещё не выбирали язык вручную
      (нет записи в localStorage) — смотрим navigator.language браузера и уводим
      на /en/ или /vi/, если он явно английский/вьетнамский. Выполняется в <head>
      до отрисовки, чтобы не было вспышки контента не на том языке. Один раз —
      после первого выбора (авто или ручного) localStorage.zhelezo_locale уже
      установлен, и этот скрипт больше не редиректит повторно.

      ВНИМАНИЕ: хэш этого блока должен быть в public/_headers, как и остальных
      инлайн-скриптов ниже — см. комментарий там же.
    -->
    <script>
      (function () {
        var stored = window.localStorage.getItem('zhelezo_locale');
        if (stored) return;
        var lang = (navigator.language || '').toLowerCase();
        var target = null;
        if (lang.indexOf('en') === 0) target = '/en/';
        else if (lang.indexOf('vi') === 0) target = '/vi/';
        if (target) {
          window.localStorage.setItem('zhelezo_locale', lang.indexOf('en') === 0 ? 'en' : 'vi');
          window.location.replace(target);
        }
      })();
    </script>

    <!--
      Гипотеза 2 (Analytics/HYPOTHESES.md): выбор цветовой темы (cyberpunk / web3)
      до первой отрисовки, чтобы избежать мигания. Тема фиксируется через ?theme=
      в URL (для сплита трафика по ссылкам-креативам) и сохраняется в localStorage.

      ВНИМАНИЕ: CSP в public/_headers разрешает инлайновые скрипт-блоки этого файла
      по sha256-хэшу их точного содержимого. Если меняете текст этого или любого
      другого инлайнового скрипт-блока ниже — пересчитайте хэш в public/_headers,
      иначе браузер молча заблокирует скрипт.
    -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var requested = params.get('theme');
        var theme = requested === 'web3' || requested === 'cyberpunk'
          ? requested
          : window.localStorage.getItem('zhelezo_theme') || 'cyberpunk';
        window.localStorage.setItem('zhelezo_theme', theme);
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
