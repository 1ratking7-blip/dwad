    <!--
      Гипотеза 2 (Analytics/HYPOTHESES.md): выбор цветовой темы (cyberpunk / web3)
      до первой отрисовки, чтобы избежать мигания. Тема фиксируется через ?theme=
      в URL (для сплита трафика по ссылкам-креативам) и сохраняется в localStorage.

      ВНИМАНИЕ: CSP в public/_headers разрешает инлайновые скрипт-блоки этого файла
      по sha256-хэшу их точного содержимого — этот блок побайтово идентичен тому же
      в корневом index.html, поэтому его хэш уже зарегистрирован, отдельно
      пересчитывать не нужно, пока текст не меняется.
    -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var requested = params.get('theme');
        var theme = requested === 'web3' || requested === 'cyberpunk'
          ? requested
          : window.localStorage.getItem('zhelezo_theme') || 'cyberpunk';
        window.localStorage.setItem('zhelezo_theme', theme);
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <!-- dataLayer доступен всегда — события пишутся сюда независимо от того, какие системы аналитики подключены -->
    <script>

    <!-- Google Analytics 4 (см. Analytics/HYPOTHESES.md, раздел 3.1).
         gtag() queues into dataLayer immediately (no network needed), so this is safe to
         define eagerly; only the actual gtag.js download+execute (148KB, the real CPU cost)
         is deferred below via __loadDeferredAnalytics — see comment there for why. -->
    <script>
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0RLZ7LGT08');
      window.gtag = gtag;
    </script>

    <!-- Yandex.Metrika counter. The stub below (m[i]=m[i]||function(){...}) IS the official
         Yandex queuing pattern: it defines window.ym as a function that just pushes calls into
         an array, so ym(...) calls made before tag.js actually loads are queued and replayed
         once it does — nothing is lost. That means it's safe to call ym('init', ...) here
         immediately; only the actual tag.js download+execute (94KB + 13KB webvisor phono
         script — real Lighthouse audit on 2026-07-21 showed this + gtag.js as the dominant
         main-thread cost delaying LCP to 6.1s/TBT 1480ms) is deferred, via
         __loadDeferredAnalytics below. -->
    <script>window.YM_COUNTER_ID = 110820422;</script>
    <script type="text/javascript">
        (function(m,e,t,r,i){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
        })(window, document, 'script', 'https://mc.yandex.ru/metrika/tag.js?id=110820422', 'ym');

        ym(110820422, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <!-- /Yandex.Metrika counter -->

    <!-- Defer the actual GTM/Yandex script downloads (the expensive part — parse+execute
         competes with the browser for the same main thread that needs to paint the LCP
         element) until the page has loaded and the main thread is idle. All calls made to
         gtag()/ym() before that point are safely queued by the stubs above, so no events are
         lost — this only moves *when* the heavy JS runs, not *whether* tracking works. -->
    <script>
      function __loadDeferredAnalytics() {
        var g = document.createElement('script');
        g.async = true;
        g.src = 'https://www.googletagmanager.com/gtag/js?id=G-0RLZ7LGT08';
        document.head.appendChild(g);

        var k = document.createElement('script');
        k.async = true;
        k.src = 'https://mc.yandex.ru/metrika/tag.js?id=110820422';
        var first = document.getElementsByTagName('script')[0];
        first.parentNode.insertBefore(k, first);
      }
      window.addEventListener('load', function () {
        if ('requestIdleCallback' in window) {
          requestIdleCallback(__loadDeferredAnalytics, { timeout: 3000 });
        } else {
          setTimeout(__loadDeferredAnalytics, 1500);
        }
      });
    </script>

    <!-- Preloader: pure CSS, no extra JS bundle cost. Removed by App.tsx's very first
         useEffect (fires right after the initial paint), so it only fills the pre-existing
         gap between HTML parse and React mount rather than adding a new delay — verified
         via Lighthouse after deploy that this doesn't regress LCP (see CHANGELOG.md). -->
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        transition: opacity 0.25s ease;
      }
      #preloader.preloader-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #preloader-mark {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: #00FF66;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        box-shadow: 0 0 30px rgba(0, 255, 102, 0.45);
        animation: preloader-pulse 1.1s ease-in-out infinite;
      }
      @keyframes preloader-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.08); opacity: 0.85; }
      }
      @media (prefers-reduced-motion: reduce) {
        #preloader-mark { animation: none; }
      }
    </style>
